<body>
<div id="nav-root"></div>

<div class="legal-hero">
  <div class="legal-hero">
    <h1>Mot de passe oublié</h1>
    <div class="sub">JB EMERIC · École de Pilotage · Région PACA</div>
  </div>
</div>

<div class="legal-body">
  <a href="javascript:history.back()" class="back-btn">← Retour</a>

<div style="text-align:center;padding:20px 0 40px">
  <p style="margin-bottom:32px;color:rgba(255,255,255,.6);font-size:15px">
    Entrez votre adresse e-mail. Nous vous enverrons un lien pour réinitialiser votre mot de passe.
  </p>
  <form id="reset-form" style="max-width:400px;margin:0 auto;text-align:left">
    <label style="display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px">
      Adresse e-mail
    </label>
    <input type="email" id="reset-email" required placeholder="vous@email.com"
      style="width:100%;padding:12px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:5px;color:#fff;font-size:15px;outline:none;box-sizing:border-box;margin-bottom:20px">
    <button type="submit" id="reset-btn"
      style="width:100%;padding:14px;background:var(--Y);color:#000;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;border:none;border-radius:5px;cursor:pointer">
      Envoyer le lien de réinitialisation
    </button>
    <div id="reset-msg" style="margin-top:16px;text-align:center;font-size:13px;min-height:20px"></div>
  </form>
  <p style="margin-top:32px;font-size:13px;color:rgba(255,255,255,.35)">
    <a href="login.html" style="color:var(--Y)">← Retour à la connexion</a>
  </p>
</div>

</div>
<div class="legal-updated">Dernière mise à jour : Mars 2026</div>

<div id="footer-root"></div>

<script type="module" src="assets/js/live-editor.js"></script>
<script src="assets/js/routes.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/footer.js"></script>
<script id="jbe-content-cache" type="application/json">{}</script>

<script type="module">
  import { resetPassword, humanError } from '/assets/js/auth.js'

  var form  = document.getElementById('reset-form')
  var input = document.getElementById('reset-email')
  var btn   = document.getElementById('reset-btn')
  var msg   = document.getElementById('reset-msg')

  form.addEventListener('submit', async function(e) {
    e.preventDefault()
    msg.style.color = 'rgba(255,255,255,.6)'
    msg.textContent = 'Envoi en cours…'
    btn.disabled = true
    try {
      await resetPassword(input.value.trim())
      msg.style.color = '#5fd97e'
      msg.textContent = 'Lien envoyé. Vérifiez votre boîte mail.'
    } catch (err) {
      msg.style.color = '#ff6b7a'
      msg.textContent = humanError(err)
      btn.disabled = false
    }
  })
</script>
</body>
</html>
