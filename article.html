<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/nav.css">
  <link rel="stylesheet" href="assets/css/paddock.css">
  <title id="page-title">Article — JB EMERIC</title>
  <meta name="description" id="page-desc" content="Article technique JB EMERIC">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { background:#07080f; color:#fff; margin:0 }

    /* Hero image */
    .art-hero-img {
      width:100%; max-height:480px; object-fit:cover; display:block;
      background:#0a0f1e;
    }
    .art-hero-no-img {
      height:120px; background:linear-gradient(135deg,#040a1e,#071230);
    }

    /* Fil d'Ariane + meta */
    .art-meta-bar {
      background:#07080f;
      padding:20px clamp(20px,5vw,72px) 0;
      display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    }
    .art-back {
      font-family:'DM Mono'; font-size:8px; letter-spacing:2px;
      text-transform:uppercase; color:rgba(255,207,0,.6); text-decoration:none;
      display:flex; align-items:center; gap:6px;
    }
    .art-back:hover { color:#FFCF00 }
    .art-sep { color:rgba(255,255,255,.2); font-size:12px }
    .art-date {
      font-family:'DM Mono'; font-size:8px; letter-spacing:1px;
      color:rgba(255,255,255,.3); text-transform:uppercase;
    }

    /* Corps de l'article */
    .art-wrap {
      max-width:800px; margin:0 auto;
      padding:clamp(32px,5vw,56px) clamp(20px,5vw,72px) clamp(56px,8vw,96px);
    }
    .art-cat-badge {
      display:inline-flex; align-items:center; gap:5px;
      padding:4px 12px; border-radius:10px;
      font-family:'DM Mono'; font-size:7.5px; letter-spacing:1.5px;
      text-transform:uppercase; font-weight:700; margin-bottom:16px;
    }
    .art-title {
      font-family:'Bebas Neue'; font-size:clamp(36px,6vw,64px);
      line-height:.95; letter-spacing:-1px; color:#fff; margin:0 0 24px;
    }
    .art-intro-text {
      font-family:'Outfit'; font-size:17px; color:rgba(255,255,255,.65);
      line-height:1.7; margin-bottom:32px; padding-bottom:32px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    /* Contenu HTML WordPress */
    .art-content {
      font-family:'Outfit'; font-size:16px; color:rgba(255,255,255,.75);
      line-height:1.8;
    }
    .art-content h1,
    .art-content h2 {
      font-family:'Bebas Neue'; color:#fff; letter-spacing:-.5px;
      margin:36px 0 12px;
    }
    .art-content h1 { font-size:clamp(28px,4vw,40px) }
    .art-content h2 { font-size:clamp(22px,3vw,32px) }
    .art-content h3 {
      font-family:'DM Mono'; font-size:13px; letter-spacing:2px;
      text-transform:uppercase; color:#FFCF00; margin:28px 0 10px;
    }
    .art-content p { margin:0 0 18px }
    .art-content a { color:#FFCF00; text-decoration:underline; text-decoration-color:rgba(255,207,0,.4) }
    .art-content a:hover { text-decoration-color:#FFCF00 }
    .art-content ul, .art-content ol {
      margin:0 0 18px; padding-left:24px;
    }
    .art-content li { margin-bottom:6px }
    .art-content strong { color:#fff; font-weight:600 }
    .art-content em { color:rgba(255,207,0,.8); font-style:italic }
    .art-content img {
      max-width:100%; height:auto; border-radius:6px;
      margin:16px 0; display:block;
    }
    .art-content blockquote {
      border-left:3px solid rgba(255,207,0,.4);
      margin:20px 0; padding:12px 20px;
      background:rgba(255,255,255,.03); border-radius:0 6px 6px 0;
      color:rgba(255,255,255,.6);
    }
    .art-content table {
      width:100%; border-collapse:collapse; margin:20px 0;
      font-family:'DM Mono'; font-size:12px;
    }
    .art-content th, .art-content td {
      padding:8px 12px; border:1px solid rgba(255,255,255,.1);
      text-align:left;
    }
    .art-content th { background:rgba(255,207,0,.08); color:#FFCF00 }
    .art-content figure { margin:20px 0 }
    .art-content figcaption {
      font-family:'DM Mono'; font-size:9px; color:rgba(255,255,255,.3);
      text-align:center; margin-top:6px; letter-spacing:1px;
    }

    /* Nav bas */
    .art-nav-bottom {
      max-width:800px; margin:0 auto;
      padding:0 clamp(20px,5vw,72px) clamp(40px,6vw,72px);
      display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;
    }
    .art-nav-btn {
      font-family:'DM Mono'; font-size:8px; letter-spacing:2px;
      text-transform:uppercase; color:rgba(255,207,0,.6); text-decoration:none;
      padding:8px 16px; border:1px solid rgba(255,207,0,.2); border-radius:5px;
      transition:all .15s;
    }
    .art-nav-btn:hover { background:rgba(255,207,0,.08); color:#FFCF00; border-color:rgba(255,207,0,.4) }

    /* Loading / error */
    .art-loading {
      text-align:center; padding:80px 20px;
      font-family:'DM Mono'; font-size:9px; letter-spacing:2px;
      text-transform:uppercase; color:rgba(255,255,255,.25);
    }
    .art-error {
      text-align:center; padding:80px 20px;
      font-family:'DM Mono'; color:rgba(255,100,100,.6);
      font-size:9px; letter-spacing:2px; text-transform:uppercase;
    }
  </style>
</head>
<body>
<div id="nav-root"></div>

<div id="art-container">
  <div class="art-loading"><span style="display:block;font-size:28px;margin-bottom:12px;opacity:.3">📄</span>Chargement de l'article…</div>
</div>

<div id="footer-root"></div>

<script type="module" src="assets/js/live-editor.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/footer.js"></script>
<script>
const SB_URL = 'https://fyaybxamuabawerqzuud.supabase.co'
const SB_KEY = 'sb_publishable_9XPoYkZmVACEtI6UfPRhYg_3RAfWXFD'
const SB_H   = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }

const CAT_MAP = {
  meca:     { label:'Mécanique',  cls:'cat-meca',     icon:'🔧' },
  elec:     { label:'Électronique',cls:'cat-elec',    icon:'⚡' },
  chas:     { label:'Châssis',    cls:'cat-chas',     icon:'🏗' },
  data:     { label:'Data',       cls:'cat-data',     icon:'📊' },
  regl:     { label:'Réglages',   cls:'cat-regl',     icon:'⚙' },
  coaching: { label:'Coaching',   cls:'cat-coaching', icon:'🎯' },
  actu:     { label:'Actualités', cls:'cat-actu',     icon:'📣' },
}

function getSlug() {
  // Hash-based routing — immune aux redirects clean-URL du serveur
  const hash = window.location.hash.slice(1)
  if (hash) return decodeURIComponent(hash)
  // Fallback query string (compatibilité)
  return new URLSearchParams(window.location.search).get('slug') || ''
}

function formatDate(iso) {
  if (!iso) return ''
  return new Date(iso).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' })
}

async function loadArticle() {
  const slug = getSlug()
  if (!slug) {
    showError('Aucun article spécifié.')
    return
  }

  try {
    const r = await fetch(
      SB_URL + '/rest/v1/docs?slug=eq.' + encodeURIComponent(slug) + '&limit=1&select=*',
      { headers: SB_H }
    )
    if (!r.ok) throw new Error('HTTP ' + r.status)
    const data = await r.json()
    if (!data || !data.length) {
      showError('Article introuvable.')
      return
    }
    renderArticle(data[0])
  } catch(e) {
    showError('Erreur de chargement : ' + e.message)
  }
}

function renderArticle(a) {
  const cat = CAT_MAP[a.category] || { label: a.category, cls: 'cat-coaching', icon: '📁' }
  const date = formatDate(a.published_at)

  // Mise à jour SEO
  document.getElementById('page-title').textContent = (a.title || 'Article') + ' — JB EMERIC'
  if (document.getElementById('page-desc') && a.intro) {
    document.getElementById('page-desc').setAttribute('content', a.intro)
  }

  // Image hero
  const heroHtml = a.image_url
    ? '<img class="art-hero-img" src="' + a.image_url + '" alt="' + (a.title||'').replace(/"/g,'') + '">'
    : '<div class="art-hero-no-img"></div>'

  // Contenu
  const contentHtml = (a.content || '<p>' + (a.intro || '') + '</p>')

  document.getElementById('art-container').innerHTML =
    heroHtml +
    '<div class="art-meta-bar">' +
      '<a class="art-back" href="articles.html">← Tous les articles</a>' +
      '<span class="art-sep">·</span>' +
      (date ? '<span class="art-date">' + date + '</span>' : '') +
    '</div>' +
    '<div class="art-wrap">' +
      '<span class="art-cat-badge ' + cat.cls + '">' + cat.icon + ' ' + cat.label + '</span>' +
      '<h1 class="art-title">' + (a.title || '') + '</h1>' +
      (a.intro ? '<p class="art-intro-text">' + a.intro + '</p>' : '') +
      '<div class="art-content">' + contentHtml + '</div>' +
    '</div>' +
    '<div class="art-nav-bottom">' +
      '<a class="art-nav-btn" href="articles.html">← Tous les articles</a>' +
      '<a class="art-nav-btn" href="paddock.html">Le Paddock</a>' +
    '</div>'
}

function showError(msg) {
  document.getElementById('art-container').innerHTML =
    '<div class="art-error"><span style="display:block;font-size:28px;margin-bottom:12px">⚠️</span>' + msg + '<br><br>' +
    '<a href="articles.html" style="color:#FFCF00;text-decoration:none;font-size:9px;letter-spacing:2px">← Retour aux articles</a></div>'
}

loadArticle()
</script>
<script id="jbe-content-cache" type="application/json">{}</script>
</body>
</html>
